name: memory_map
description: "Travel nostalgia app — plan trips, capture daily memories (photos & audio), enjoy local music and cultural suggestions."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Local DB
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # HTTP
  dio: ^5.7.0

  # Media capture / playback
  image_picker: ^1.1.2
  record: ^6.2.0
  just_audio: ^0.9.42

  # Permissions
  permission_handler: ^11.3.1

  # AI
  google_generative_ai: ^0.4.6

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.18.0
  flag: ^7.0.0
  url_launcher: ^6.3.1
  rxdart: ^0.28.0

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.5
  drift_dev: ^2.22.1
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/geo/ne_110m_admin_0_countries.geojson
